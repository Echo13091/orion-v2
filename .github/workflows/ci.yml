name: Orion CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend:
    name: Frontend build and lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --quiet

      - name: Build
        run: npm run build

  backend:
    name: Backend import smoke check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server/backend

    env:
      ORION_DISABLE_STARTUP: "1"
      ORION_EDGE_MODE: "1"
      ORION_LLM_ENABLED: "0"
      ORION_CODE_LLM_ENABLED: "0"
      ORION_EVENT_LOG_PATH: /tmp/orion_events.jsonl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: server/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import Flask app
        run: python -c "from app import app; print(app.name)"

      - name: Check route map
        run: python -c "from app import app; print(len(list(app.url_map.iter_rules())))"

      - name: Run backend smoke tests
        run: python -m pytest -q
