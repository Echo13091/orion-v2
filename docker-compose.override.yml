services:
  thermostat-bridge:
    image: orionv2-backend
    container_name: orion-thermostat-bridge
    command: ["python", "thermostat_bridge.py"]
    working_dir: /app
    environment:
      ORION_SYSTEM_URL: http://backend:5001/v1/system
      ORION_THERMOSTAT_INGEST_URL: http://backend:5001/v1/thermostats/ingest
      ORION_THERMOSTAT_SYNC_INTERVAL_SECONDS: "10"
    depends_on:
      - backend
    restart: unless-stopped
