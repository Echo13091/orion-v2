services:
  backend:
    build: ./server/backend
    container_name: orion-backend
    ports:
      - "5001:5001"
    environment:
      VISION_NODE_URL: http://192.168.7.218:5000
      VISION_NODE_FALLBACK_URL: http://100.69.25.43:5000
      VISION_TIMEOUT: "3.0"
      ORION_EVENT_LOG_PATH: /app/memory/orion_events.jsonl
    volumes:
      - ./server/backend/memory:/app/memory
      - orion_backend_logs:/app/logs
    restart: unless-stopped

  frontend:
    build: ./server/frontend
    container_name: orion-frontend
    ports:
      - "3001:3000"
    restart: unless-stopped
    depends_on:
      - backend

  mqtt:
    image: eclipse-mosquitto
    container_name: orion-mqtt
    ports:
      - "1883:1883"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    restart: unless-stopped

volumes:
  orion_backend_logs:
  mosquitto_data:
  mosquitto_logs:
