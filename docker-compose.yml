services:
  backend:
    build: ./server/backend
    container_name: orion-backend
    ports:
      - "5001:5001"
    volumes:
      - ./server/backend/memory:/app/memory
      - orion_backend_logs:/app/logs
    restart: unless-stopped

  frontend:
    build: ./server/frontend
    container_name: orion-frontend
    ports:
      - "3001:3000"
    restart: unless-stopped
    depends_on:
      - backend

  mqtt:
    image: eclipse-mosquitto
    container_name: orion-mqtt
    ports:
      - "1883:1883"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    restart: unless-stopped

volumes:
  orion_backend_logs:
  mosquitto_data:
  mosquitto_logs: